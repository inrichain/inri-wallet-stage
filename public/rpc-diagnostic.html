<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INRI RPC Diagnostic</title>
  <style>
    body{font-family:Ubuntu,Arial,sans-serif;background:#0b1220;color:#fff;padding:24px}
    .card{max-width:880px;margin:0 auto;border:1px solid #22314f;background:#101827;border-radius:24px;padding:20px}
    button{padding:12px 16px;border:none;border-radius:14px;background:#4f7cff;color:#fff;font-weight:700;cursor:pointer}
    pre{white-space:pre-wrap;background:#0a1322;border:1px solid #1f2c47;padding:14px;border-radius:16px;overflow:auto}
  </style>
</head>
<body>
  <div class="card">
    <h1>INRI RPC Diagnostic</h1>
    <p>Checks rpc.inri.life and rpc-chain.inri.life side by side.</p>
    <button id="run">Run diagnostic</button>
    <pre id="out">Ready.</pre>
  </div>
<script>
const RPCS = [
  "https://rpc.inri.life",
  "https://rpc-chain.inri.life"
];
async function post(url, method, params = []) {
  const started = performance.now();
  const res = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ jsonrpc: "2.0", id: 1, method, params })
  });
  const ms = Math.round(performance.now() - started);
  const text = await res.text();
  let data;
  try { data = JSON.parse(text); } catch { data = { raw: text }; }
  return { ok: res.ok, status: res.status, ms, data };
}
async function run() {
  const out = document.getElementById("out");
  out.textContent = "Running...";
  const result = [];
  for (const rpc of RPCS) {
    result.push(`\n=== ${rpc} ===`);
    try {
      const chainId = await post(rpc, "eth_chainId");
      result.push(`eth_chainId -> HTTP ${chainId.status} in ${chainId.ms}ms`);
      result.push(JSON.stringify(chainId.data, null, 2));
      const block = await post(rpc, "eth_blockNumber");
      result.push(`eth_blockNumber -> HTTP ${block.status} in ${block.ms}ms`);
      result.push(JSON.stringify(block.data, null, 2));
    } catch (err) {
      result.push(`ERROR: ${err.message || String(err)}`);
      result.push("If browser fetch fails here, likely CORS / SSL / reverse proxy / timeout issue.");
    }
  }
  out.textContent = result.join("\n");
}
document.getElementById("run").addEventListener("click", run);
</script>
</body>
</html>
