<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>INRI RPC Diagnostic</title>
  <style>body{font-family:system-ui,sans-serif;background:#0b0f1a;color:#fff;padding:20px}button{padding:12px 16px;border:0;border-radius:12px;background:#3f7cff;color:#fff;font-weight:700;cursor:pointer}pre{white-space:pre-wrap;background:#101827;padding:14px;border-radius:16px;border:1px solid #22314f}</style>
</head>
<body>
  <h1>INRI RPC Diagnostic</h1>
  <p>Tests https://rpc.inri.life and https://rpc-chain.inri.life with browser fetch.</p>
  <button onclick="run()">Run test</button>
  <pre id="out">Waiting...</pre>
<script>
async function rpc(url, method, params=[]) {
  const started = performance.now();
  const res = await fetch(url, {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({jsonrpc:'2.0', id:1, method, params})});
  const text = await res.text();
  return { ms: Math.round(performance.now() - started), status: res.status, body: text };
}
async function run(){
  const urls = ['https://rpc.inri.life','https://rpc-chain.inri.life'];
  const out = [];
  for (const url of urls) {
    out.push('=== ' + url + ' ===');
    try { out.push(JSON.stringify(await rpc(url,'eth_chainId'), null, 2)); } catch (e) { out.push('eth_chainId ERROR: ' + e); }
    try { out.push(JSON.stringify(await rpc(url,'eth_blockNumber'), null, 2)); } catch (e) { out.push('eth_blockNumber ERROR: ' + e); }
    out.push('');
  }
  document.getElementById('out').textContent = out.join('\n');
}
</script>
</body>
</html>
